<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">

<body
style="background-color:#e8f5e9;">
<div class="form-group container shadow col-lg-4 col-md-6 mt-5 py-2 rounded bg-white">
    <h4 class="text-center">Feedback</h4>
    <label for="i">Name </label>
    <input id="i" class="form-control mb-3"  placeholder="Enter your name">
    <label for="o">Email</label>
    <input id="o" class="form-control" placeholder="Enter your Email ">
    <label class="mt-3 d-block">Preferred Contact</label>
    <input type="radio" class="form-check-input-inline" name="f" id="o">
    <label for="o">Email</label>
    <input type="radio" class="form-check-input-inline" name="f" id="p">
    <label for="p">Phone</label>
    <label class="d-block">Type of Order:</label>
    <select class="form-control" >
        <option hidden>Select an option</option>
        <option>Cake</option>
        <option>Cookies</option>
        <option>Pastries</option>
    </select>
    <label class="mt-3"> Satisfaction level</label>
    <input type="range" class=" form-control-range">
    <div class="d-flex justify-content-between">
        <span>1</span>
        <span>2</span>
        <span>3</span>
        <span>4</span>
        <span>5</span>
        <span>6</span>
        <span>7</span>
        <span>8</span>
        <span>9</span>
        <span>10</span>
    </div>
        <label class="mt-2">Feedback</label>
    <textarea class="form-control" rows="3"></textarea>
    <button class="py-1 my-4 btn-block btn-primary rounded border-0">Submit</button>  
</div>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js" defer></script>
