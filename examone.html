<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">

</head>
<body class="bg-primary">
    <div class="container col-10 col-sm-8 col-lg-6 col-xl-5 px-3 bg-white mt-5 pt-3">
        <h3><strong>Sign Up</strong></h3>
        <p class="text-muted">Please fill in this form to create an account</p>
        <div class="form-group border-top px-3">
        <div class="row">
            <div  class="col-12 col-sm-6">
                <input class="form-control bg-light border-0 mt-3" placeholder="First Name">
            </div>
            <div class="col-12 col-sm-6 ">
                <input class="form-control bg-light border-0 mt-3" placeholder="Last Name">
            </div>
        </div>
                    <input class="form-control mt-3 bg-light border-0 " placeholder="Email">
                    <input class="form-control mt-3 bg-light border-0" placeholder="Password">  
                    <input class="form-control mt-3 bg-light border-0" placeholder="Confirm Password">  

        <div class=" mt-3 form-check">
                <input type="checkbox" class="form-check-input ">
            <label class="form-check-label"> I accepted the<span class="text-primary"> Terms of Use</span> & <span class="text-primary">Privacy Policy</span></label>
        </div>
        <button class="btn btn-primary px-5 mb-5 mt-3">Sign Up</button>
        </div>
    </div>
<p class="text-center text-white">Already have an account ? <u><a class="text-white link-text" href="#">Login here</a></u></p>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js" defer></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js" defer></script>


    
</body>
</html>
