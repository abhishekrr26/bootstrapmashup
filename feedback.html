<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
</head>
<body
style="background:linear-gradient(#e0f7fa , #ffffff);
background-attachment: fixed;">
    <div class="form-group container mt-5">
        <div class="ml-5 row">
        <div class=" ml-5 col-8 border shadow bg-white">
        <h3 class="mt-3 text-center">Feedback Form</h3>
        <label for="o">Name</label>
        <input id="o" class="form-control">
        <label for="j">Email</label>
        <input id="j" class="form-control mb-2">
        <label>How do you know us</label>
        <select class="form-control ">
            <option>By Instagram</option>
            <option>By Youtube</option>
            <option>By Friends</option>
            <option>By Ads</option>
        </select>
        <label class="d-block mt-2">Satisfaction level</label>
        <div class="form-check-inline">
            <label class="form-check-label">
                <input type="radio" name="q" class="form-check-input">         
                1</label>
        </div>
         <div class="form-check-inline">
            <label class="form-check-label">
                <input type="radio" name="q" class="form-check-input">         
                2
            </label>
        </div>
         <div class="form-check-inline">
            <label class="form-check-label">
                <input type="radio" name="q" class="form-check-input">         
                3
            </label>
        </div>
         <div class="form-check-inline">
            <label class="form-check-label">
                <input type="radio" name="q" class="form-check-input">         
                4
            </label>
        </div>

         <div class="form-check-inline">
            <label class="form-check-label">
                <input type="radio" name="q" class="form-check-input">         
                5
            </label>
        </div>
     <label for="comment" class=" mt-4 d-block">Comment:</label>
     <textarea class="form-control mb-4" rows="3" id="comment"></textarea>
    <button type="button" class="mb-4 d-block btn btn-success mx-auto px-5">Submit</button>
    </div>
        </div>
    </div>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js" defer></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js" defer></script>        
</body>
</html>
