<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Progress</title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">


</head>
<body
style="background: linear-gradient(#009688, #a5d6a7);
       background-attachment: fixed;">
    <header class="mt-4 text-center display-4 text-white">Web Development Course <span class="badge badge-info">New</span></header>
    <ul class="breadcrumb text-white mt-4 pl-3 container-fluid bg-dark" >
        <li class="breadcrumb-item ">Home</li>
        <li class="breadcrumb-item">Courses</li>
        <li class="breadcrumb-item"> Web Development</li>
    </ul>
    <div class="progress container p-0 col-10" style="height: 25px; width: 800px;" >
        <div class="progress-bar bg-success progress-bar-striped" style="width: 100%;">
            HTML-100%
        </div>
    </div>
     <div class="progress container p-0 mt-4 col-10" style="height: 25px; width: 800px;" >
        <div class="progress-bar progress-bar-striped progress-bar-animated " style="width: 75%;">
          CSS-75%
        </div>
    </div>
     <div class="progress container p-0 mt-4 col-10" style="height: 25px; width: 800px;" >
        <div class="progress-bar bg-warning" style="width: 50%;">
            Javascript-50%
        </div>
    </div>
     <div class="progress container p-0 mt-4 col-10" style="height: 25px; width: 800px;" >
        <div class="progress-bar bg-danger" style="width: 25%;">
            Bootstrap-25%
        </div>
    </div>
    <div class="container text-center mt-5 ">
        <button class="btn btn-success mr-4 px-5">Start</button>
        <button class="btn btn-danger text-white px-5">Pause</button>
        <button class="btn btn-primary ml-4 px-5 ">Reset</button>
    </div>

        <div class="container mt-5 ">
            <ul class="pagination justify-content-center">
                <li class="page-item active"><a class="page-link" href="">1</a></li>
                <li class="page-item"><a class="page-link" href="">2</a></li>
                <li class="page-item disabled"><a class="page-link" href="">3</a></li>
            </ul>

        </div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js" defer></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js" defer></script>   

</body>
</html>
